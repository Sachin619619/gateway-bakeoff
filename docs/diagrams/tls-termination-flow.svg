<svg viewBox="0 0 1100 660" xmlns="http://www.w3.org/2000/svg" width="1100" height="660">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,12 4.5,0 9" fill="#475569"/>
    </marker>
    <marker id="ah-green" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,12 4.5,0 9" fill="#059669"/>
    </marker>
    <marker id="ah-red" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,12 4.5,0 9" fill="#DC2626"/>
    </marker>
    <marker id="ah-purple" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,12 4.5,0 9" fill="#7C3AED"/>
    </marker>
    <marker id="ah-orange" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,12 4.5,0 9" fill="#D97706"/>
    </marker>
    <marker id="ah-blue" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,12 4.5,0 9" fill="#1D4ED8"/>
    </marker>
  </defs>
  <rect width="1100" height="660" fill="#F8FAFC" rx="12"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="1100" height="52" fill="#1E293B" rx="12"/>
  <rect x="0" y="40" width="1100" height="12" fill="#1E293B"/>
  <text x="550" y="33" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="20" font-weight="bold" fill="white">TLS Termination — Full HTTPS Flow</text>

  <!-- mkcert box -->
  <rect x="30" y="80" width="200" height="90" rx="10" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
  <text x="130" y="107" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="bold" fill="#4C1D95">1  mkcert</text>
  <text x="130" y="126" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#6D28D9">generates cert for</text>
  <text x="130" y="143" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#6D28D9">localhost + 127.0.0.1</text>
  <text x="130" y="160" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#8B5CF6">tls.crt + tls.key</text>

  <!-- Arrow: mkcert to K8s secret -->
  <line x1="231" y1="125" x2="318" y2="125" stroke="#7C3AED" stroke-width="2.5" marker-end="url(#ah-purple)"/>
  <text x="275" y="115" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#7C3AED">kubectl create</text>
  <text x="275" y="127" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#7C3AED">secret tls</text>

  <!-- K8s TLS Secret box -->
  <rect x="320" y="80" width="220" height="90" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="430" y="106" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="bold" fill="#92400E">2  K8s TLS Secret</text>
  <text x="430" y="124" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#92400E">name: httpbin-tls</text>
  <text x="430" y="142" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#B45309">tls.crt  (public cert)</text>
  <text x="430" y="159" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#B45309">tls.key  (private key)</text>

  <!-- Arrow: secret down to gateway -->
  <line x1="430" y1="170" x2="430" y2="256" stroke="#D97706" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ah-orange)"/>
  <text x="470" y="210" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#D97706">3  gateway reads</text>
  <text x="470" y="223" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#D97706">TLS secret</text>

  <!-- Client box -->
  <rect x="30" y="298" width="160" height="84" rx="10" fill="#F1F5F9" stroke="#94A3B8" stroke-width="2"/>
  <text x="110" y="331" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="bold" fill="#1E293B">Client</text>
  <text x="110" y="350" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#475569">curl / browser</text>
  <text x="110" y="367" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#475569">port-forward</text>

  <!-- Arrow 4: HTTPS Client to Gateway (upper) -->
  <line x1="191" y1="323" x2="308" y2="323" stroke="#1D4ED8" stroke-width="3" marker-end="url(#ah-blue)"/>
  <circle cx="250" cy="302" r="13" fill="#1D4ED8"/>
  <text x="250" y="307" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="bold" fill="white">4</text>
  <text x="250" y="289" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#1D4ED8">HTTPS :8443</text>
  <text x="250" y="277" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#1D4ED8">(encrypted)</text>

  <!-- Arrow 5: HTTP Client to Gateway (lower, dashed red) -->
  <line x1="191" y1="362" x2="308" y2="362" stroke="#DC2626" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ah-red)"/>
  <text x="250" y="380" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#DC2626">HTTP :8080</text>

  <!-- Ingress Controller box -->
  <rect x="310" y="258" width="260" height="164" rx="10" fill="#1D4ED8" stroke="#1E40AF" stroke-width="2"/>
  <text x="440" y="292" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="bold" fill="white">5  Ingress Controller</text>
  <text x="440" y="311" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#BFDBFE">NGINX / Traefik / HAProxy / Kong</text>
  <line x1="330" y1="320" x2="550" y2="320" stroke="#3B82F6" stroke-width="1"/>
  <text x="440" y="337" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#93C5FD">Decrypts TLS using secret</text>
  <text x="440" y="355" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#93C5FD">X-Forwarded-Proto: https</text>
  <text x="440" y="373" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#93C5FD">X-Forwarded-For: client-ip</text>
  <text x="440" y="391" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#93C5FD">X-Forwarded-Host: localhost</text>
  <text x="440" y="412" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#FCA5A5">HTTP :8080 returns 308 Redirect</text>

  <!-- 308 redirect curve back to client -->
  <path d="M310 378 Q200 470 191 365" fill="none" stroke="#DC2626" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#ah-red)"/>
  <text x="185" y="462" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#DC2626">308 Permanent</text>
  <text x="185" y="475" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#DC2626">Redirect to :8443</text>

  <!-- Arrow 6: Gateway to Service (green = plain HTTP) -->
  <line x1="571" y1="340" x2="678" y2="340" stroke="#059669" stroke-width="3" marker-end="url(#ah-green)"/>
  <circle cx="625" cy="316" r="13" fill="#059669"/>
  <text x="625" y="321" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="bold" fill="white">6</text>
  <text x="625" y="303" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#059669">plain HTTP</text>
  <text x="625" y="291" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#059669">(decrypted)</text>

  <!-- Service box -->
  <rect x="680" y="298" width="180" height="84" rx="10" fill="#065F46" stroke="#047857" stroke-width="2"/>
  <text x="770" y="331" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="bold" fill="white">Service</text>
  <text x="770" y="350" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#6EE7B7">httpbin</text>
  <text x="770" y="367" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#6EE7B7">port :80</text>

  <!-- Arrow 7: Service to Pod -->
  <line x1="861" y1="340" x2="918" y2="340" stroke="#475569" stroke-width="3" marker-end="url(#ah)"/>
  <circle cx="890" cy="316" r="13" fill="#475569"/>
  <text x="890" y="321" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="bold" fill="white">7</text>

  <!-- Pod box -->
  <rect x="920" y="298" width="160" height="84" rx="10" fill="#065F46" stroke="#047857" stroke-width="2"/>
  <text x="1000" y="331" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="bold" fill="white">Pod</text>
  <text x="1000" y="350" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#6EE7B7">httpbin :8080</text>
  <text x="1000" y="367" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#6EE7B7">sees plain HTTP</text>

  <!-- Legend box -->
  <rect x="20" y="510" width="1060" height="128" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="550" y="532" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="bold" fill="#1E293B">Legend</text>
  <line x1="40" y1="550" x2="70" y2="550" stroke="#1D4ED8" stroke-width="3"/>
  <text x="78" y="554" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1E293B">HTTPS (encrypted traffic)</text>
  <line x1="280" y1="550" x2="310" y2="550" stroke="#059669" stroke-width="3"/>
  <text x="318" y="554" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1E293B">Plain HTTP (decrypted by gateway)</text>
  <line x1="570" y1="550" x2="600" y2="550" stroke="#DC2626" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="608" y="554" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1E293B">HTTP 308 redirect to HTTPS</text>
  <line x1="830" y1="550" x2="860" y2="550" stroke="#D97706" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="868" y="554" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1E293B">TLS secret read by gateway</text>
  <text x="40" y="578" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="bold" fill="#059669">Key insight:</text>
  <text x="120" y="578" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#475569">TLS is terminated AT the gateway — backend only ever sees plain HTTP.</text>
  <text x="40" y="596" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#475569">X-Forwarded-Proto: https tells the backend the original request was secure.</text>
  <text x="40" y="616" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#475569">HTTP clients hitting :8080 get a 308 redirect back to the HTTPS port :8443 automatically.</text>
  <text x="40" y="632" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#475569">The mkcert cert is locally trusted — no browser warning, curl works without -k flag.</text>
</svg>
