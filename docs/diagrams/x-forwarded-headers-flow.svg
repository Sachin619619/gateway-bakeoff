<svg viewBox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg" width="1100" height="620">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,12 4.5,0 9" fill="#475569"/>
    </marker>
    <marker id="ah-dash" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,12 4.5,0 9" fill="#D97706"/>
    </marker>
  </defs>
  <rect width="1100" height="620" fill="#F8FAFC" rx="12"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="1100" height="52" fill="#1E293B" rx="12"/>
  <rect x="0" y="40" width="1100" height="12" fill="#1E293B"/>
  <text x="550" y="33" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="20" font-weight="bold" fill="white">X-Forwarded Headers — Full Request Flow</text>
  <!-- Client box -->
  <rect x="30" y="298" width="160" height="84" rx="10" fill="#F1F5F9" stroke="#94A3B8" stroke-width="2"/>
  <text x="110" y="331" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="bold" fill="#1E293B">Client</text>
  <text x="110" y="350" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#475569">k6 / curl</text>
  <text x="110" y="367" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#475569">port-forward :8080</text>
  <!-- Arrow 1: Client to Gateway -->
  <line x1="191" y1="340" x2="308" y2="340" stroke="#475569" stroke-width="3" marker-end="url(#ah)"/>
  <circle cx="250" cy="316" r="13" fill="#3B82F6"/>
  <text x="250" y="321" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="bold" fill="white">1</text>
  <text x="250" y="303" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#475569">HTTP :8080</text>
  <!-- Ingress Controller box -->
  <rect x="310" y="278" width="260" height="124" rx="10" fill="#1D4ED8" stroke="#1E40AF" stroke-width="2"/>
  <text x="440" y="314" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="bold" fill="white">Ingress Controller</text>
  <text x="440" y="333" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#BFDBFE">NGINX / Traefik / HAProxy / Kong</text>
  <line x1="330" y1="344" x2="550" y2="344" stroke="#3B82F6" stroke-width="1"/>
  <text x="440" y="360" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#93C5FD">Reads client IP from socket</text>
  <text x="440" y="378" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#93C5FD">Injects 3 X-Forwarded headers</text>
  <text x="440" y="396" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#93C5FD">Forwards request to backend</text>
  <!-- Arrow 2: annotation dashed -->
  <line x1="440" y1="402" x2="440" y2="454" stroke="#D97706" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ah-dash)"/>
  <!-- Headers annotation box -->
  <rect x="270" y="456" width="340" height="112" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="440" y="478" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="bold" fill="#92400E">2  Headers injected by gateway:</text>
  <text x="285" y="500" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#92400E">X-Forwarded-For:   </text>
  <text x="430" y="500" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="bold" fill="#78350F">203.0.113.99, 127.0.0.1</text>
  <text x="285" y="520" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#92400E">X-Forwarded-Proto:  </text>
  <text x="444" y="520" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="bold" fill="#78350F">https</text>
  <text x="285" y="540" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#92400E">X-Forwarded-Host:   </text>
  <text x="430" y="540" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="bold" fill="#78350F">localhost</text>
  <!-- Arrow 3: Gateway to Service -->
  <line x1="571" y1="340" x2="678" y2="340" stroke="#475569" stroke-width="3" marker-end="url(#ah)"/>
  <circle cx="625" cy="316" r="13" fill="#3B82F6"/>
  <text x="625" y="321" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="bold" fill="white">3</text>
  <text x="625" y="303" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#475569">+ headers</text>
  <!-- Service box -->
  <rect x="680" y="298" width="180" height="84" rx="10" fill="#065F46" stroke="#047857" stroke-width="2"/>
  <text x="770" y="331" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="bold" fill="white">Service</text>
  <text x="770" y="350" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#6EE7B7">httpbin</text>
  <text x="770" y="367" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#6EE7B7">port :80</text>
  <!-- Arrow 4: Service to Pod -->
  <line x1="861" y1="340" x2="918" y2="340" stroke="#475569" stroke-width="3" marker-end="url(#ah)"/>
  <circle cx="890" cy="316" r="13" fill="#3B82F6"/>
  <text x="890" y="321" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="bold" fill="white">4</text>
  <!-- Pod box -->
  <rect x="920" y="298" width="160" height="84" rx="10" fill="#065F46" stroke="#047857" stroke-width="2"/>
  <text x="1000" y="331" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="bold" fill="white">Pod</text>
  <text x="1000" y="350" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#6EE7B7">httpbin :8080</text>
  <text x="1000" y="367" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#6EE7B7">echoes headers back</text>
  <!-- Response path dashed -->
  <path d="M1000 383 L1000 425 L110 425 L110 383" fill="none" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ah)"/>
  <text x="555" y="444" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#94A3B8">5  JSON response (httpbin echoes all received headers back)</text>
  <!-- Legend -->
  <line x1="30" y1="592" x2="60" y2="592" stroke="#475569" stroke-width="3"/>
  <text x="68" y="596" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#475569">Request forward path</text>
  <line x1="250" y1="592" x2="280" y2="592" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="288" y="596" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#94A3B8">Response return path</text>
  <line x1="470" y1="592" x2="500" y2="592" stroke="#D97706" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="508" y="596" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#D97706">Headers injected by gateway</text>
</svg>
